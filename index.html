<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Magic Tiles">
<meta name="theme-color" content="#050508">
<link rel="apple-touch-icon" href="./icon.png">
<title>Magic Tiles 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --c1:#FF006E;--c2:#FB5607;--c3:#FFBE0B;--c4:#06D6A0;--c5:#118AB2;--c6:#8338EC;
  --bg:#050508;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
}

/* ══ CREAM THEME ══════════════════════════════════════════ */
body.theme-cream{
  --cr-bg:#F7F3EE; --cr-bg2:#EDE8E0; --cr-ink:#2C2420;
  --cr-ink2:rgba(44,36,32,.5); --cr-accent:#8B6355;
  --cr-bdr:rgba(44,36,32,.1); --cr-card:rgba(44,36,32,.04);
  background:var(--cr-bg);
  font-family:'DM Sans',sans-serif;
}
body.theme-cream .bg-grid{background-image:linear-gradient(var(--cr-bdr) 1px,transparent 1px),linear-gradient(90deg,var(--cr-bdr) 1px,transparent 1px);background-size:48px 48px;}
body.theme-cream #start-screen{background:linear-gradient(160deg,#F7F3EE 0%,#EDE8E0 100%);}
body.theme-cream #gameover-screen{background:linear-gradient(160deg,#F7F3EE 0%,#EDE8E0 100%);}
body.theme-cream .game-title{
  background:none;-webkit-text-fill-color:var(--cr-ink);color:var(--cr-ink);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;
  font-size:clamp(40px,11vw,62px);letter-spacing:2px;filter:none;
  text-shadow:0 2px 12px rgba(139,99,85,.15);margin-bottom:6px;
}
body.theme-cream .title-eyebrow{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:6px;color:var(--cr-accent);text-transform:uppercase;margin-bottom:8px;}
body.theme-cream .title-line{width:40px;height:1.5px;background:var(--cr-accent);margin:0 auto 18px;opacity:.5;}
body.theme-cream .score-label{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:2px;color:var(--cr-ink2);}
body.theme-cream .score-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--cr-ink);text-shadow:none;}
body.theme-cream #level-badge{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1px;color:var(--cr-ink);border-color:var(--cr-bdr);background:var(--cr-card);}
body.theme-cream #hud{border-bottom:1px solid var(--cr-bdr);}
body.theme-cream #miss-bar{opacity:.85;}
body.theme-cream .heart{filter:drop-shadow(0 0 3px #8B6355);}
body.theme-cream .section-label,.carousel-label{color:var(--cr-ink2);font-family:'DM Sans',sans-serif;}
body.theme-cream .level-card{border-color:var(--cr-bdr);background:var(--cr-card);}
body.theme-cream .level-card.active{border-color:var(--cr-accent);background:rgba(139,99,85,.07);box-shadow:0 6px 20px rgba(139,99,85,.12);}
body.theme-cream .lc-name{color:var(--cr-ink);font-family:'DM Sans',sans-serif;font-weight:600;}
body.theme-cream .lc-sub{color:var(--cr-ink2);}
body.theme-cream .lc-cover{background:var(--cr-bg2);border-color:var(--cr-bdr);}
body.theme-cream .add-card{border-color:rgba(44,36,32,.2);}
body.theme-cream .add-icon,.add-card-lbl{color:var(--cr-ink2);}
body.theme-cream .btn{font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:2px;font-size:14px;}
body.theme-cream .btn-primary{background:var(--cr-ink);color:var(--cr-bg);box-shadow:0 4px 20px rgba(44,36,32,.2);}
body.theme-cream .btn-secondary{background:var(--cr-card);color:var(--cr-ink);border-color:var(--cr-bdr);}
body.theme-cream .diff-row{border-top:1px solid var(--cr-bdr);padding-top:14px;}
body.theme-cream .diff-label{color:var(--cr-ink2);font-family:'DM Sans',sans-serif;}
body.theme-cream .diff-pill{border-color:var(--cr-bdr);background:transparent;color:var(--cr-ink2);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;}
body.theme-cream .diff-pill.active{color:var(--cr-bg);}
body.theme-cream .hc-toggle-label{color:var(--cr-ink2);font-family:'DM Sans',sans-serif;}
body.theme-cream .hc-box{border-color:var(--cr-bdr);background:var(--cr-card);}
body.theme-cream .hc-box.on{background:var(--cr-ink);border-color:var(--cr-ink);}
body.theme-cream .col-line{background:var(--cr-bdr);}
body.theme-cream #game-wrap{border-top-color:var(--cr-bdr);}
body.theme-cream #miss-flash{background:rgba(139,99,85,.18);}
body.theme-cream .go-title{color:var(--cr-ink);font-family:'Cormorant Garamond',serif;font-style:italic;text-shadow:none;}
body.theme-cream .go-song{color:var(--cr-ink2);}
body.theme-cream .go-stat-label{color:var(--cr-ink2);font-family:'DM Sans',sans-serif;}
body.theme-cream .go-stat-val{color:var(--cr-ink);font-family:'Cormorant Garamond',serif;font-size:26px;}
body.theme-cream .go-grade{color:var(--cr-accent);text-shadow:none;font-family:'Cormorant Garamond',serif;}
body.theme-cream .go-stars{color:var(--cr-accent);}
body.theme-cream .go-accuracy,.go-stat-detail{color:var(--cr-ink2);font-family:'DM Sans',sans-serif;}
body.theme-cream #judgement{font-family:'DM Sans',sans-serif;font-weight:700;}
body.theme-cream #combo-pop{font-family:'Cormorant Garamond',serif;font-style:italic;}
body.theme-cream #countdown{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--cr-ink);text-shadow:none;}
body.theme-cream .modal-box{background:var(--cr-bg);border-color:var(--cr-bdr);}
body.theme-cream .modal-title{color:var(--cr-ink);font-family:'DM Sans',sans-serif;}
body.theme-cream .modal-status{color:var(--cr-ink2);}
body.theme-cream .lm-input{background:var(--cr-bg2);border-color:var(--cr-bdr);color:var(--cr-ink);}
body.theme-cream .modal-progress-bar{background:linear-gradient(90deg,var(--cr-accent),#2C2420);}
body.theme-cream .magnet-carousel-wrap::before{background:linear-gradient(to right,var(--cr-bg),transparent);}
body.theme-cream .magnet-carousel-wrap::after{background:linear-gradient(to left,var(--cr-bg),transparent);}

/* ══ RESET & BASE ═════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100dvh;width:100vw;display:flex;flex-direction:column;align-items:center;user-select:none;touch-action:none;padding-top:var(--sat);padding-bottom:var(--sab);padding-left:var(--sal);padding-right:var(--sar);}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}

/* ── THEME ROW ── */
.theme-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.theme-btn{font-size:18px;cursor:pointer;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;transition:all .2s;opacity:.45;}
.theme-btn.active{opacity:1;border-color:var(--c4);}
body.theme-cream .theme-btn.active{border-color:var(--cr-accent);}

/* ── HUD ── */
#hud{position:relative;z-index:10;width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;padding:10px 20px 4px;}
.score-block{display:flex;flex-direction:column;align-items:center;}
.score-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.score-val{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:#fff;text-shadow:0 0 18px var(--c4);transition:transform .1s;}
.score-val.pop{transform:scale(1.22);}
#level-badge{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;padding:4px 11px;border-radius:999px;border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);background:rgba(255,255,255,.06);letter-spacing:1px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
#miss-bar{position:relative;z-index:10;width:100%;max-width:480px;padding:0 20px 4px;display:flex;gap:5px;align-items:center;}
.heart{font-size:18px;transition:all .3s;filter:drop-shadow(0 0 5px #FF006E);}
.heart.lost{filter:none;opacity:.2;}
#hardcore-badge{font-family:'Orbitron',monospace;font-size:8px;font-weight:900;color:#FF006E;letter-spacing:2px;margin-left:6px;display:none;}

/* ── GAME WRAP ── */
#game-wrap{position:relative;z-index:10;width:100%;max-width:480px;flex:1;overflow:hidden;border-top:1px solid rgba(255,255,255,.07);}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#particle-canvas{z-index:2;pointer-events:none;}
#game-canvas{z-index:1;}
.col-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.05);z-index:3;pointer-events:none;}

/* ── JUDGEMENT & COMBO ── */
#judgement{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',monospace;font-size:22px;font-weight:900;pointer-events:none;z-index:12;white-space:nowrap;letter-spacing:2px;opacity:0;}
#judgement.pop{animation:judgePop .5s cubic-bezier(.22,1.4,.5,1) forwards;}
@keyframes judgePop{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}40%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}70%{transform:translate(-50%,-50%) scale(.96);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}
#combo-pop{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 40px var(--c3);pointer-events:none;z-index:11;white-space:nowrap;opacity:0;}
#combo-pop.show{animation:comboPop .75s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}50%{transform:translate(-50%,-50%) scale(1.05);opacity:1;}80%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(16px);padding:var(--sat) var(--sar) var(--sab) var(--sal);}
#start-screen{background:radial-gradient(ellipse at 50% 48%,rgba(131,56,236,.22) 0%,rgba(5,5,8,.97) 65%);overflow-y:auto;justify-content:flex-start;padding-top:calc(var(--sat) + 24px);padding-bottom:28px;gap:0;}
#gameover-screen{display:none;background:radial-gradient(ellipse at 50% 40%,rgba(255,0,110,.18) 0%,rgba(5,5,8,.97) 70%);gap:0;overflow-y:auto;padding:calc(var(--sat) + 20px) var(--sar) calc(var(--sab) + 20px) var(--sal);}
#results-inner{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:380px;}

/* ── TITLE AREA ── */
.title-area{display:flex;flex-direction:column;align-items:center;margin-bottom:8px;width:100%;max-width:440px;padding:0 20px;}
.title-eyebrow{display:none;}
.title-line{display:none;}
.game-title{font-family:'Orbitron',monospace;font-size:clamp(28px,8vw,44px);font-weight:900;text-align:center;line-height:1.1;background:linear-gradient(135deg,var(--c1),var(--c3),var(--c4),var(--c6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(131,56,236,.5));margin-bottom:16px;}

/* ── CAROUSEL (primary) ── */
.carousel-primary{width:100%;margin-bottom:6px;}
.carousel-primary .carousel-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;font-weight:600;padding-left:20px;margin-bottom:12px;}
.magnet-carousel-wrap{position:relative;width:100%;overflow:hidden;}
.magnet-carousel{display:flex;gap:14px;padding:10px 0;will-change:transform;}
.magnet-carousel.animating{transition:transform .32s cubic-bezier(.25,1,.5,1);}
.magnet-carousel-wrap::before,.magnet-carousel-wrap::after{content:'';position:absolute;top:0;bottom:0;width:52px;z-index:2;pointer-events:none;}
.magnet-carousel-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.magnet-carousel-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent);}

/* ── LEVEL CARDS ── */
.level-card{min-width:160px;max-width:160px;border-radius:18px;padding:12px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;transition:transform .22s cubic-bezier(.25,1,.5,1),border-color .22s,box-shadow .22s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.level-card.active{border-color:var(--accent,#06D6A0);background:rgba(6,214,160,.08);transform:scale(1.05);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 0 1.5px var(--accent,#06D6A0);}
.level-card.active .lc-cover{box-shadow:0 0 18px var(--accent,#06D6A0);transform:scale(1.03);}
.add-card{justify-content:center;border:1.5px dashed rgba(255,255,255,.2);background:transparent;position:relative;}
.add-icon{font-size:32px;color:rgba(255,255,255,.35);line-height:1;}
.add-card-lbl{font-size:11px;color:rgba(255,255,255,.38);margin-top:4px;}
.add-card input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.lc-cover{width:100%;height:120px;object-fit:cover;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:all .3s ease;display:flex;align-items:center;justify-content:center;font-size:36px;}
img.lc-cover{display:block;}
.lc-info{width:100%;}
.lc-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-sub{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.del-btn{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(255,0,110,.7);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;opacity:0;transition:opacity .2s;border:none;}
.level-card:hover .del-btn{opacity:1;}

/* ── DIFF ROW ── */
.diff-row{width:100%;max-width:440px;padding:10px 20px 0;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.diff-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;font-weight:600;white-space:nowrap;}
.diff-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.diff-pill{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;padding:5px 13px;border-radius:999px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);cursor:pointer;transition:all .18s;letter-spacing:1px;}
.diff-pill.active{color:#fff;border-color:transparent;}
.diff-pill[data-d="EASY"].active{background:#06D6A0;}
.diff-pill[data-d="NORMAL"].active{background:#FFBE0B;}
.diff-pill[data-d="HARD"].active{background:#FB5607;}
.diff-pill[data-d="INSANE"].active{background:#FF006E;}

/* ── HC TOGGLE ── */
.hc-row{width:100%;max-width:440px;padding:0 20px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.hc-toggle-label{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.45);text-transform:uppercase;flex:1;}
.hc-toggle-label span{color:#FF006E;}
.hc-box{width:36px;height:20px;border-radius:999px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;}
.hc-box::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s,background .2s;}
.hc-box.on{background:#FF006E;border-color:#FF006E;}
.hc-box.on::after{left:18px;}

/* ── BUTTONS & PLAY ROW ── */
.btn{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px 40px;border:none;border-radius:999px;cursor:pointer;transition:transform .15s,filter .15s;}
.btn:active{transform:scale(.94);}
.btn-primary{background:linear-gradient(135deg,var(--c1),var(--c6));color:#fff;box-shadow:0 0 32px rgba(131,56,236,.45);}
.btn-secondary{background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);border:1.5px solid rgba(255,255,255,.12);}
.play-row{display:flex;align-items:center;gap:12px;margin-top:8px;margin-bottom:4px;}
#loading-text{display:none;font-size:12px;color:var(--c4);margin-top:8px;font-weight:600;animation:pulse 1s infinite alternate;}
@keyframes pulse{from{opacity:.5;}to{opacity:1;}}

/* ── MODAL ── */
#add-modal{background:rgba(5,5,8,.97);z-index:200;display:none;}
.modal-box{width:90%;max-width:340px;background:rgba(18,18,24,1);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:26px;display:flex;flex-direction:column;gap:14px;box-shadow:0 24px 60px rgba(0,0,0,.9);}
.modal-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff;text-align:center;letter-spacing:1px;}
.modal-status{font-size:12px;color:rgba(255,255,255,.5);text-align:center;min-height:32px;line-height:1.5;}
.modal-status.ok{color:var(--c4);}
.modal-status.err{color:var(--c1);}
.modal-progress-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;}
.modal-progress-bar{height:100%;background:linear-gradient(90deg,var(--c4),var(--c6));width:0%;transition:width .4s;border-radius:999px;}
.lm-input{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;}
.lm-input:focus{border-color:var(--c4);}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.modal-btns .btn{flex:1;padding:12px;font-size:11px;}

/* ── RESULTS SCREEN ── */
.go-song{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:2px;text-align:center;text-transform:uppercase;}
.go-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--c1);text-shadow:0 0 28px var(--c1);text-align:center;}
.go-stars{font-size:42px;letter-spacing:6px;text-align:center;}
.go-grade{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;text-align:center;line-height:1;}
.go-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;}
.go-stat-block{background:rgba(255,255,255,.05);border-radius:12px;padding:10px 8px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.go-stat-label{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:4px;display:block;}
.go-stat-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fff;display:block;}
.go-stat-detail{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;display:block;}
.go-score-row{display:flex;gap:16px;width:100%;}
.go-score-main{flex:1;background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.go-accuracy-row{font-size:12px;color:rgba(255,255,255,.4);text-align:center;letter-spacing:1px;}
.results-btns{display:flex;gap:10px;}

/* ── MISC ── */
#death-overlay{display:none;}
#miss-flash{position:fixed;inset:0;background:rgba(255,0,110,.18);pointer-events:none;z-index:50;opacity:0;transition:opacity .1s;}
#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:80px;font-weight:900;color:#fff;text-shadow:0 0 60px var(--c4);pointer-events:none;z-index:20;opacity:0;}
#countdown.show{animation:countAnim .6s ease-out forwards;}
@keyframes countAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(1.4);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);}}
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  MAGIC TILES 2026
//  SYNC MODEL: tiles spawn at T0 + beat.time - fallTime
//  fallTime = wrapH / pxPerSec  (constant per session, not per difficulty)
//  Difficulty ONLY changes visual speed, never beat timestamps.
// ═══════════════════════════════════════════════════════════════════════════

// ── LEVELS ────────────────────────────────────────────────────────────────
const BUILTIN_LEVELS = [
  {id:'b1',name:'Reine',artist:'Dadju',diffColor:'#06D6A0',accent:'#06D6A0',audioUrl:'./musiques/1.mp3',beatmapUrl:'./musiques/beatmap_1.json',cover:'./musiques/cover1.jpg'},
  {id:'b2',name:'DÁKITI',artist:'Bad Bunny',diffColor:'#FFBE0B',accent:'#FFBE0B',audioUrl:'./musiques/2.mp3',beatmapUrl:'./musiques/beatmap_2.json',cover:'./musiques/cover2.jpg'},
  {id:'b3',name:'Changer',artist:'GIMS',diffColor:'#FB5607',accent:'#FB5607',audioUrl:'./musiques/3.mp3',beatmapUrl:'./musiques/beatmap_3.json',cover:'./musiques/cover3.jpg'},
  {id:'b4',name:'Just Keep Watching',artist:'Tate McRae',diffColor:'#FB5607',accent:'#FB5607',audioUrl:'./musiques/4.mp3',beatmapUrl:'./musiques/beatmap_4.json',cover:'./musiques/cover4.jpg'}
];
let CUSTOM_LEVELS = [];
let ALL_LEVELS = [...BUILTIN_LEVELS]; // rebuilt when custom added
let currentLevel = BUILTIN_LEVELS[0];
let currentDiff  = 'NORMAL';
let hardcoreMode = false; // separate from difficulty

// ── DIFFICULTY: speed only, timing never changes ──
// Lower speeds = tiles fall slower but still hit on beat (just more time to react).
// The beatmap timestamps are absolute seconds from audio start — unchanged by diff.
const DIFF_PARAMS = {
  EASY:   {speedMult:0.72, sliderChance:.10, diagChance:0,   doubleChance:.00},
  NORMAL: {speedMult:0.92, sliderChance:.16, diagChance:0,   doubleChance:.07},
  HARD:   {speedMult:1.18, sliderChance:.23, diagChance:.08, doubleChance:.14},
  INSANE: {speedMult:1.55, sliderChance:.28, diagChance:.16, doubleChance:.22},
};
const BASE_SPEED = 460; // px/s at speedMult=1.0
// Diagonals only in HARD+
const DIAG_MIN_GAP = {EASY:999,NORMAL:999,HARD:14,INSANE:9};

// ── COLORS ────────────────────────────────────────────────────────────────
const DARK_COLORS=['#E8447A','#F0A500','#00C896','#9B59D4'];
const DARK_LIGHT =['#FF8CB3','#FFD166','#5EFFD6','#C89FFF'];
const DARK_GLOW  =['rgba(232,68,122,.85)','rgba(240,165,0,.85)','rgba(0,200,150,.85)','rgba(155,89,212,.85)'];
const CREAM_COLORS=['#9B4A5A','#B87B2A','#527A5C','#7B6B8A'];
const CREAM_LIGHT =['#D4889A','#D4A84B','#82B08A','#A899B8'];
const CREAM_GLOW  =['rgba(155,74,90,.8)','rgba(184,123,42,.8)','rgba(82,122,92,.8)','rgba(123,107,138,.8)'];
let COL_COLORS,COL_LIGHT,COL_GLOW;
let DIAG_COL,DIAG_LIGHT,DIAG_GLOW;

let currentTheme=localStorage.getItem('mt_theme')||'dark';
function applyTheme(t){
  currentTheme=t;localStorage.setItem('mt_theme',t);
  document.body.className=t==='cream'?'theme-cream':'';
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
  if(t==='cream'){
    COL_COLORS=CREAM_COLORS;COL_LIGHT=CREAM_LIGHT;COL_GLOW=CREAM_GLOW;
    DIAG_COL='#7B6B4A';DIAG_LIGHT='#C4A87A';DIAG_GLOW='rgba(123,107,74,.8)';
    document.getElementById('start-screen').style.background='';
  } else {
    COL_COLORS=DARK_COLORS;COL_LIGHT=DARK_LIGHT;COL_GLOW=DARK_GLOW;
    DIAG_COL='#4CC9F0';DIAG_LIGHT='#A8EDFF';DIAG_GLOW='rgba(76,201,240,.85)';
  }
  // Update carousel fade gradients
  const bg=t==='cream'?'#F7F3EE':'#050508';
  document.querySelectorAll('.magnet-carousel-wrap::before,.magnet-carousel-wrap::after').forEach(()=>{});
}
applyTheme(currentTheme);

const JUDGEMENTS=[
  {name:'PARFAIT',  maxDist:.09,color:'#FFD166',pts:15,comboBonus:true,  key:'parfait'},
  {name:'EXCELLENT',maxDist:.22,color:'#00C896',pts:12,comboBonus:false, key:'excellent'},
  {name:'SUPER',    maxDist:.38,color:'#C89FFF',pts:10,comboBonus:false, key:'super'},
  {name:'BON',      maxDist:.56,color:'#74B9FF',pts:7, comboBonus:false, key:'bon'},
  {name:'MAUVAIS',  maxDist:1.5,color:'#E8447A',pts:2, comboBonus:false, key:'miss'},
];
const COMBO_MS=[10,20,30,50,75,100,200,500];
const COMBO_LB={10:'🔥×10',20:'⚡×20',30:'💥×30',50:'🌟×50',75:'🔮×75',100:'👑×100',200:'GODLIKE',500:'HACKER'};

// ── DOM ────────────────────────────────────────────────────────────────────
const canvas=document.getElementById('game-canvas'),ctx=canvas.getContext('2d');
const pCanvas=document.getElementById('particle-canvas'),pCtx=pCanvas.getContext('2d');
const wrap=document.getElementById('game-wrap');

// ── STATE ──────────────────────────────────────────────────────────────────
let tiles=[],particles=[],animId=null;
let score=0,bestScore=parseInt(localStorage.getItem('mt_best')||'0');
let combo=0,maxCombo=0,misses=3,maxMisses=3;
// Detailed stats
let statCounts={parfait:0,excellent:0,super:0,bon:0,miss:0};
let totalNotes=0,hitNotes=0,playerDied=false;
let gameRunning=false,isDying=false,dyingProgress=0;
let lastTime=0,wrapH=0,colW=0,tileH=0;
let activeSliders={},blockedCols=new Set();
let timingLinePulse=0;
let customPattern=[],patIdx=0,patternQueue=[];
let beatScheduler=null,_songEndChecker=null;
let audioStartAcTime=0;
let customAudioSrc=null,customAudioGain=null;
let AC=null,tempAudioBuffer=null;

function getAC(){if(!AC||AC.state==='closed')AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function stopAudio(){if(customAudioSrc){try{customAudioSrc.stop();}catch(e){}try{customAudioSrc.disconnect();}catch(e){} customAudioSrc=null;}}

// ── RESIZE ────────────────────────────────────────────────────────────────
function resize(){const r=wrap.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;pCanvas.width=r.width;pCanvas.height=r.height;wrapH=r.height;colW=r.width/4;tileH=Math.min(155,Math.max(100,r.height*.17));}
resize();window.addEventListener('resize',resize);
function timingY(){return wrapH-tileH;}
function pxPerSec(){return BASE_SPEED*DIFF_PARAMS[currentDiff].speedMult;}
function fallTime(){return wrapH/pxPerSec();}

// ── SCHEDULER (sync-safe) ─────────────────────────────────────────────────
// KEY: tile timestamps are absolute seconds from audio start.
// spawnTime = T0 + beat.time - fallTime
// This is computed live in fillQueue, so changing speed changes visual fall,
// but the audio T0 anchor stays fixed → always in sync.
function startScheduler(){
  if(beatScheduler)clearInterval(beatScheduler);
  if(_songEndChecker)clearInterval(_songEndChecker);
  patternQueue=[];patIdx=0;
  beatScheduler=setInterval(fillQueue,40);
  _songEndChecker=setInterval(checkSongEnd,600);
}
function fillQueue(){
  if(!gameRunning)return;
  const ac=getAC(),fall=fallTime();
  const horizon=ac.currentTime+5.0;
  while(patIdx<customPattern.length){
    const e=customPattern[patIdx];
    const spawnAc=audioStartAcTime+e.time-fall;
    if(spawnAc>horizon)break;
    patIdx++;
    if(e.rest)continue;
    patternQueue.push({acTime:spawnAc,col:e.col,type:e.type||'tap',col2:e.col2||-1,double:e.double||false});
    if(e.double&&e.col2>=0)patternQueue.push({acTime:spawnAc,col:e.col2,type:'tap',col2:-1,double:false});
    const ms=(audioStartAcTime+e.time-ac.currentTime)*1000;
    if(ms>0)setTimeout(()=>{if(gameRunning)timingLinePulse=1;},ms);
    else timingLinePulse=1;
  }
}
function checkSongEnd(){
  if(!gameRunning)return;
  if(patIdx>=customPattern.length&&patternQueue.length===0&&tiles.filter(t=>!t.hit&&!t.dying).length===0){
    clearInterval(_songEndChecker);_songEndChecker=null;
    setTimeout(()=>{if(gameRunning){gameRunning=false;stopAudio();_showGameOver();}},1200);
  }
}

// ── SPAWN ─────────────────────────────────────────────────────────────────
function processSpawnQueue(){
  if(!gameRunning)return;
  const now=getAC().currentTime;
  // Rebuild blocked cols: ANY slider/diagonal tile that is alive blocks its col
  blockedCols.clear();
  for(const t of tiles){
    if((t.type==='slider'||t.type==='diagonal')&&!t.dying){
      blockedCols.add(t.col);
      if(t.type==='diagonal')blockedCols.add(Math.round(t.diagEndX/colW));
    }
  }
  // Count all alive (not dead, not fully gone) tiles
  const aliveTiles=tiles.filter(t=>!t.dying&&!t.collapsing);
  while(patternQueue.length&&patternQueue[0].acTime<=now){
    const e=patternQueue.shift();
    if(blockedCols.has(e.col))continue;
    if(e.type==='diagonal'&&e.col2>=0&&blockedCols.has(e.col2))continue;
    // MAX 2 tiles alive simultaneously (including active sliders)
    if(aliveTiles.length>=2)continue;
    if(aliveTiles.some(t=>t.col===e.col))continue;
    const tile=makeTile(e.col,e.type,e.col2);
    tiles.push(tile);
    aliveTiles.push(tile);
  }
}

function makeTile(col,type='tap',col2=-1){
  const isHold=type==='slider'||type==='diagonal';
  const sl=isHold?tileH*(2.2+Math.random()*1.3):0;
  return {id:Math.random(),col,type,col2,x:col*colW,y:-tileH,w:colW,h:tileH,sliderLen:sl,hit:false,dying:false,dyingT:0,glow:0,opacity:1,sliderActive:false,sliderProgress:0,sliderDone:false,hitY:0,diagStartX:col*colW,diagEndX:col2>=0?col2*colW:col*colW,collapseVx:0,collapseVy:0,collapseGravity:0,collapseRot:0,collapseRotV:0,collapseAlpha:1,collapsing:false};
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
function burst(x,y,col,n=20){
  const isDiag=col==='diag';
  const c=isDiag?DIAG_COL:COL_COLORS[col],l=isDiag?DIAG_LIGHT:COL_LIGHT[col];
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*7;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.024+Math.random()*.04,r:2+Math.random()*5,color:c,light:l});}
}
function updateParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=p.decay;pCtx.save();pCtx.globalAlpha=Math.max(0,p.life);pCtx.fillStyle=p.life>.5?p.light:p.color;pCtx.shadowColor=p.color;pCtx.shadowBlur=8;pCtx.beginPath();pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);pCtx.fill();pCtx.restore();}
}

// ── TIMING LINE ──────────────────────────────────────────────────────────
function drawTimingLine(){
  const y=timingY(),pulse=timingLinePulse;if(timingLinePulse>0)timingLinePulse=Math.max(0,timingLinePulse-.034);
  ctx.save();const zg=ctx.createLinearGradient(0,y,0,wrapH);zg.addColorStop(0,`rgba(255,209,102,${.018+pulse*.052})`);zg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=zg;ctx.fillRect(0,y,canvas.width,tileH);
  ctx.globalAlpha=.17+pulse*.44;ctx.strokeStyle='rgba(255,255,255,1)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();
  if(pulse>.04){ctx.globalAlpha=pulse*.6;ctx.shadowColor='#FFD166';ctx.shadowBlur=16;ctx.strokeStyle='#FFD166';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  for(let c=0;c<4;c++){const cx=c*colW+colW/2;ctx.globalAlpha=.4+pulse*.38;ctx.fillStyle=pulse>.08?'#FFD166':COL_COLORS[c];ctx.shadowColor=pulse>.08?'#FFD166':COL_GLOW[c];ctx.shadowBlur=pulse>0?9*pulse:3;ctx.beginPath();ctx.moveTo(cx,y-5.5);ctx.lineTo(cx+5.5,y);ctx.lineTo(cx,y+5.5);ctx.lineTo(cx-5.5,y);ctx.closePath();ctx.fill();}
  ctx.restore();
}

function drawTapTile(t){
  if(t.dying&&t.dyingT>=1) return;
  const pad=3;let x=t.x+pad,y=t.y+pad,w=t.w-pad*2,h=t.h-pad*2,r=13;
  const color=COL_COLORS[t.col],light=COL_LIGHT[t.col],glow=COL_GLOW[t.col];
  let alpha=t.opacity;
  if(t.dying){const p=t.dyingT,sc=1+p*.4;alpha=1-p;const dw=(w*sc-w)/2,dh=(h*sc-h)/2;x-=dw;y-=dh;w*=sc;h*=sc;}
  if(t.collapsing) alpha=t.collapseAlpha;
  ctx.save();
  if(t.collapsing){const cx=x+w/2,cy=y+h/2;ctx.translate(cx,cy);ctx.rotate(t.collapseRot);ctx.translate(-cx,-cy);}
  ctx.globalAlpha=Math.max(0,alpha);

  // ── Drop shadow (depth) ──
  if(!t.dying&&!t.collapsing){
    ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  }
  if(t.glow>0||t.dying){ctx.shadowColor=glow;ctx.shadowBlur=t.dying?50*t.dyingT:30*t.glow;ctx.shadowOffsetY=0;}

  // ── Main body gradient ──
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,light+'ee');
  g.addColorStop(0.18,color+'ff');
  g.addColorStop(0.72,color+'ee');
  g.addColorStop(1,color+'99');
  ctx.fillStyle=g;ctx.fill();

  if(!t.dying&&!t.collapsing){
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

    // ── Inner top bevel (bright) ──
    ctx.beginPath();ctx.roundRect(x+2,y+2,w-4,6,{upperLeft:r-2,upperRight:r-2,lowerLeft:1,lowerRight:1});
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.fill();

    // ── Pearl / nacre shine spot ──
    const shineGrad=ctx.createRadialGradient(x+w*.3,y+h*.25,0,x+w*.3,y+h*.25,w*.55);
    shineGrad.addColorStop(0,'rgba(255,255,255,.38)');
    shineGrad.addColorStop(0.45,'rgba(255,255,255,.08)');
    shineGrad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);
    ctx.fillStyle=shineGrad;ctx.fill();

    // ── Bottom inner shadow ──
    ctx.beginPath();ctx.roundRect(x+3,y+h-5,w-6,4,{upperLeft:1,upperRight:1,lowerLeft:r-2,lowerRight:r-2});
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();

    // ── Emboss border: light top, dark bottom ──
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);
    const brd=ctx.createLinearGradient(x,y,x,y+h);
    brd.addColorStop(0,'rgba(255,255,255,.5)');
    brd.addColorStop(0.5,'rgba(255,255,255,.15)');
    brd.addColorStop(1,'rgba(0,0,0,.25)');
    ctx.strokeStyle=brd;ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.restore();
}

// ── DRAW SLIDER ───────────────────────────────────────────────────────────────
function drawSliderTile(t){
  if(t.dying&&t.dyingT>=1) return;
  const pad=3,r=13;
  const color=COL_COLORS[t.col],light=COL_LIGHT[t.col],glow=COL_GLOW[t.col];
  const x=t.x+pad,w=t.w-pad*2;
  const headTop=t.y+pad,headH=t.h-pad*2;
  const tailTop=t.y-t.sliderLen+pad,tailH=t.sliderLen-pad*2;
  const fullTop=tailH>2?tailTop:headTop,totalH=tailH>2?tailH+headH+pad:headH;
  let alpha=t.dying?Math.max(0,1-t.dyingT*4):t.opacity;
  if(t.collapsing) alpha=t.collapseAlpha;
  ctx.save();
  if(t.collapsing){const hcx=t.x+t.w/2,hcy=t.y+t.h/2;ctx.translate(hcx,hcy);ctx.rotate(t.collapseRot);ctx.translate(-hcx,-hcy);}
  ctx.globalAlpha=alpha;
  if(t.sliderActive){ctx.shadowColor=glow;ctx.shadowBlur=22;ctx.shadowOffsetY=0;}

  // ── Tail body ──
  if(tailH>2&&tailTop<wrapH){
    // Frosted glass tail
    ctx.beginPath();ctx.roundRect(x,fullTop,w,totalH,r);
    const tg=ctx.createLinearGradient(x,fullTop,x,fullTop+totalH);
    tg.addColorStop(0,color+'20');tg.addColorStop(1,color+'70');
    ctx.fillStyle=tg;ctx.fill();
    ctx.strokeStyle=light+'35';ctx.lineWidth=1;ctx.stroke();

    // Progress fill (nacre effect — luminous sweep)
    if(t.sliderProgress>0){
      const fillH=tailH*Math.min(1,t.sliderProgress);
      ctx.save();ctx.beginPath();ctx.roundRect(x,fullTop,w,totalH,r);ctx.clip();
      const fy=headTop-fillH;
      ctx.beginPath();ctx.rect(x,fy,w,fillH+headH);
      const gf=ctx.createLinearGradient(x,fy,x,fy+fillH);
      gf.addColorStop(0,light+'88');gf.addColorStop(0.6,color+'cc');gf.addColorStop(1,color+'ff');
      ctx.fillStyle=gf;ctx.fill();
      // Shimmer line at fill frontier
      ctx.beginPath();ctx.moveTo(x,fy);ctx.lineTo(x+w,fy);
      ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }
    // Tail top cap
    if(tailTop>-4&&tailH>6){
      ctx.beginPath();ctx.roundRect(x,fullTop,w,8,{upperLeft:r,upperRight:r,lowerLeft:2,lowerRight:2});
      ctx.fillStyle=light+'60';ctx.fill();
    }
  }

  // ── Head (same as tap tile with pearl shine) ──
  ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
  if(t.sliderActive){ctx.shadowColor=glow;ctx.shadowBlur=22;ctx.shadowOffsetY=0;}
  ctx.beginPath();ctx.roundRect(x,headTop,w,headH,r);
  const gh=ctx.createLinearGradient(x,headTop,x,headTop+headH);
  gh.addColorStop(0,light+'ee');gh.addColorStop(0.2,color+'ff');gh.addColorStop(0.75,color+'ee');gh.addColorStop(1,color+'99');
  ctx.fillStyle=gh;ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Top bevel
  ctx.beginPath();ctx.roundRect(x+2,headTop+2,w-4,6,{upperLeft:r-2,upperRight:r-2,lowerLeft:1,lowerRight:1});
  ctx.fillStyle='rgba(255,255,255,.42)';ctx.fill();
  // Pearl shine
  const sp=ctx.createRadialGradient(x+w*.3,headTop+headH*.25,0,x+w*.3,headTop+headH*.25,w*.5);
  sp.addColorStop(0,'rgba(255,255,255,.35)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.roundRect(x,headTop,w,headH,r);ctx.fillStyle=sp;ctx.fill();
  // Emboss border
  ctx.beginPath();ctx.roundRect(x,headTop,w,headH,r);
  const bh=ctx.createLinearGradient(x,headTop,x,headTop+headH);
  bh.addColorStop(0,'rgba(255,255,255,.5)');bh.addColorStop(1,'rgba(0,0,0,.2)');
  ctx.strokeStyle=bh;ctx.lineWidth=1.5;ctx.stroke();
  // Arrow ↑
  const mx=x+w/2,my=headTop+headH/2;
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.beginPath();ctx.moveTo(mx,my-8);ctx.lineTo(mx+9,my+5);ctx.lineTo(mx-9,my+5);ctx.closePath();ctx.fill();
  ctx.restore();
}

// ── DRAW DIAGONAL ─────────────────────────────────────────────────────────────
// The diagonal is ALWAYS a parallelogram from diagStartX (tail top) to diagEndX (head bottom).
// Before activation: we estimate the visual position based on scroll distance already traveled.
// The tile body has total height = tileH + sliderLen.
// When the head (bottom of body) is at y=timingY, the tile has traveled wrapH px.
// "visual progress" = how far the head has moved relative to the full diagonal shift.
function drawDiagSlider(t){
  if(t.dying&&t.dyingT>=1) return;
  const pad=4,r=10;
  const tailW=t.w-pad*2;
  // CORRECT diagonal model:
  // Tail top (top of body) = diagStartX column — FIXED always
  // Head bottom (bottom of body) = diagEndX column — FIXED always
  // This creates the parallelogram shape from first frame, static, no movement.
  // After activation: sliderProgress controls a fill that climbs from head upward.
  // t.x is set to diagEndX so the player taps the destination column.
  const headX = t.diagEndX + pad;   // head is always at destination col
  const headW = tailW;
  const headTop = t.y + pad;
  const headH = t.h - pad*2;

  // Tail top is always at source col (diagStartX)
  const tailX = t.diagStartX + pad;
  const tailTop = t.y - t.sliderLen + pad;
  const tailLen = t.sliderLen - pad*2;

  let alpha = t.dying ? Math.max(0,1-t.dyingT*4) : t.opacity;
  if(t.collapsing) alpha = t.collapseAlpha;

  ctx.save();
  if(t.collapsing){
    const cx=(tailX+headX)/2+headW/2, cy=(tailTop+headTop+headH)/2;
    ctx.translate(cx,cy);ctx.rotate(t.collapseRot);ctx.translate(-cx,-cy);
  }
  ctx.globalAlpha = alpha;
  if(t.sliderActive){ctx.shadowColor=DIAG_GLOW;ctx.shadowBlur=22;}

  // ── Body (parallelogram) ──
  if(tailLen>2 && tailTop<wrapH){
    ctx.beginPath();
    ctx.moveTo(tailX, tailTop);
    ctx.lineTo(tailX+tailW, tailTop);
    ctx.lineTo(headX+headW, headTop+headH);
    ctx.lineTo(headX, headTop+headH);
    ctx.closePath();
    ctx.fillStyle = DIAG_COL+'55'; ctx.fill();
    ctx.strokeStyle = DIAG_COL+'40'; ctx.lineWidth=1; ctx.stroke();

    // Fill progress (only after activation)
    if(t.sliderActive && t.sliderProgress>0){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(tailX,tailTop);ctx.lineTo(tailX+tailW,tailTop);
      ctx.lineTo(headX+headW,headTop+headH);ctx.lineTo(headX,headTop+headH);
      ctx.closePath(); ctx.clip();
      const fy = headTop - tailLen*t.sliderProgress;
      ctx.beginPath(); ctx.rect(0,fy,canvas.width,tailLen*t.sliderProgress+headH);
      const gf = ctx.createLinearGradient(0,fy,0,headTop+headH);
      gf.addColorStop(0,DIAG_LIGHT+'90'); gf.addColorStop(1,DIAG_COL+'cc');
      ctx.fillStyle=gf; ctx.fill(); ctx.restore();
    }
    // Top cap
    if(tailTop>-4){
      ctx.beginPath();
      ctx.moveTo(tailX,tailTop);ctx.lineTo(tailX+tailW,tailTop);
      ctx.lineTo(tailX+tailW,tailTop+8);ctx.lineTo(tailX,tailTop+8);
      ctx.closePath(); ctx.fillStyle=DIAG_LIGHT+'50'; ctx.fill();
    }
  }

  // ── Head (bright 3D tile at destination column) ──
  ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
  if(t.sliderActive){ctx.shadowColor=DIAG_GLOW;ctx.shadowBlur=22;ctx.shadowOffsetY=0;}
  ctx.beginPath(); ctx.roundRect(headX,headTop,headW,headH,r);
  const gh=ctx.createLinearGradient(headX,headTop,headX,headTop+headH);
  gh.addColorStop(0,DIAG_LIGHT+'ee'); gh.addColorStop(0.25,DIAG_COL+'ff'); gh.addColorStop(1,DIAG_COL+'99');
  ctx.fillStyle=gh; ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Top bevel
  ctx.beginPath();ctx.roundRect(headX+2,headTop+2,headW-4,6,{upperLeft:r-2,upperRight:r-2,lowerLeft:1,lowerRight:1});
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.fill();
  // Pearl shine
  const dsp=ctx.createRadialGradient(headX+headW*.3,headTop+headH*.25,0,headX+headW*.3,headTop+headH*.25,headW*.5);
  dsp.addColorStop(0,'rgba(255,255,255,.35)');dsp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.roundRect(headX,headTop,headW,headH,r);ctx.fillStyle=dsp;ctx.fill();
  // Emboss border
  ctx.beginPath(); ctx.roundRect(headX,headTop,headW,headH,r);
  const brd2=ctx.createLinearGradient(headX,headTop,headX,headTop+headH);
  brd2.addColorStop(0,'rgba(255,255,255,.55)');brd2.addColorStop(1,'rgba(0,0,0,.2)');
  ctx.strokeStyle=brd2;ctx.lineWidth=1.5;ctx.stroke();

  // Arrow pointing toward target col
  const dir = t.diagEndX > t.diagStartX ? 1 : -1;
  const mx=headX+headW/2, my=headTop+headH/2;
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.beginPath();
  if(dir>0){ctx.moveTo(mx-8,my-5);ctx.lineTo(mx+8,my);ctx.lineTo(mx-8,my+5);}
  else{ctx.moveTo(mx+8,my-5);ctx.lineTo(mx-8,my);ctx.lineTo(mx+8,my+5);}
  ctx.closePath(); ctx.fill();
  ctx.restore();
}


// ── GAME LOOP ─────────────────────────────────────────────────────────────
function loop(ts){
  if(!gameRunning&&!isDying)return;
  const rawDt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  let ts2=1;
  if(isDying){
    dyingProgress=Math.min(1,dyingProgress+rawDt/1.6);ts2=Math.max(0,1-dyingProgress);
    if(dyingProgress>=1){isDying=false;tiles=[];particles=[];ctx.clearRect(0,0,canvas.width,canvas.height);pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);_showGameOver();return;}
  }
  const dt=rawDt*ts2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(isDying){const sat=Math.max(0,1-dyingProgress),bri=Math.max(.18,1-dyingProgress*.82);canvas.style.filter=`saturate(${sat}) brightness(${bri})`;pCanvas.style.filter=`saturate(${sat}) brightness(${bri})`;}
  else{canvas.style.filter='';pCanvas.style.filter='';}
  if(!isDying)processSpawnQueue();
  drawTimingLine();
  const spd=pxPerSec();
  for(const t of tiles){
    if(!t.hit&&!t.dying)t.y+=spd*dt;
    if((t.type==='slider'||t.type==='diagonal')&&t.sliderActive&&!t.sliderDone)t.y+=spd*dt;
    if(t.glow>0)t.glow=Math.max(0,t.glow-rawDt*6);
    if(t.dying)t.dyingT=Math.min(1,t.dyingT+rawDt*6);
    if(t.collapsing){t.collapseVy+=t.collapseGravity*rawDt;t.x+=t.collapseVx*rawDt;t.y+=t.collapseVy*rawDt;t.collapseRot+=t.collapseRotV*rawDt;t.collapseAlpha=Math.max(0,1-dyingProgress*1.5);}
    if(!isDying&&(t.type==='slider'||t.type==='diagonal')&&t.sliderActive&&!t.sliderDone){
      const traveled=t.y-t.hitY;t.sliderProgress=Math.min(1,traveled/t.sliderLen);
      // diagonal x stays fixed (diagEndX) — only fill progress moves
      if(t.sliderProgress>=1||t.y>wrapH+tileH*.4){t.sliderDone=true;t.sliderActive=false;t.dying=true;t.dyingT=0;onSliderDone(t);}
    }
    if(t.type==='diagonal')drawDiagSlider(t);
    else if(t.type==='slider')drawSliderTile(t);
    else drawTapTile(t);
  }
  tiles.forEach(t=>{if(!t.hit&&!t.dying&&t.y+t.h/2>wrapH+tileH*.4)killMiss(t);});
  tiles=tiles.filter(t=>!(t.collapsing&&(t.y>wrapH+tileH*2||t.collapseAlpha<=0))&&!(t.dying&&t.dyingT>=1)&&t.y<wrapH+tileH*3);
  updateParticles();animId=requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function getJudgement(tile){const dist=Math.abs((tile.y+tile.h/2)-timingY())/tileH;for(const j of JUDGEMENTS)if(dist<=j.maxDist)return j;return JUDGEMENTS[JUDGEMENTS.length-1];}
function showJudgement(j){const el=document.getElementById('judgement');el.textContent=j.name;el.style.color=j.color;el.style.textShadow=`0 0 22px ${j.color}`;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
function onTap(cx,cy,tid){
  getAC();
  const rect=wrap.getBoundingClientRect(),ty=timingY();
  const col=Math.min(3,Math.floor((cx-rect.left)/colW));
  let best=null,bestDist=Infinity;
  for(const t of tiles){
    if(t.hit||t.dying)continue;
    let inCol;
    if(t.type==='diagonal'){
      const tapCol=Math.min(3,Math.floor((cx-rect.left)/colW));
      const destCol=Math.round(t.diagEndX/colW),srcCol=Math.round(t.diagStartX/colW);
      inCol=(tapCol===destCol||(tapCol===srcCol&&!t.sliderActive));
    } else inCol=t.col===col;
    if(!inCol)continue;
    const center=t.y+t.h/2;
    if(center<ty-tileH*1.5||center>ty+tileH*1.5)continue;
    const d=Math.abs(center-ty);if(d<bestDist){bestDist=d;best=t;}
  }
  if(!best)return;
  totalNotes++;
  if(best.type==='tap'){
    const j=getJudgement(best);best.hit=true;best.glow=1;best.dying=true;best.dyingT=0;
    burst(best.x+best.w*.5,best.y+best.h*.5,best.col);applyScore(j);showJudgement(j);
  } else {
    const j=getJudgement(best);best.hit=true;best.glow=1;best.sliderActive=true;best.hitY=best.y;
    if(tid!==undefined)activeSliders[tid]=best;
    blockedCols.add(best.col);
    if(best.type==='diagonal'&&best.col2>=0)blockedCols.add(best.col2);
    showJudgement(j);score+=5;updateHUD();
  }
}
function onTouchEnd(tid){
  if(!(tid in activeSliders))return;
  const t=activeSliders[tid];delete activeSliders[tid];
  if(!t||t.sliderDone||!t.sliderActive)return;
  t.sliderActive=false;
  if(t.sliderProgress<0.45){t.dying=true;t.dyingT=0;killMiss(t,true);}
  else{t.sliderDone=true;t.dying=true;t.dyingT=0;showJudgement(JUDGEMENTS[3]);score+=8;combo++;maxCombo=Math.max(maxCombo,combo);updateHUD();showComboPop();}
}
function onSliderDone(t){
  burst(t.x+t.w*.5,wrapH-tileH/2,t.type==='diagonal'?'diag':t.col,32);
  showJudgement(JUDGEMENTS[0]);applyScore(JUDGEMENTS[0],true);
}
function applyScore(j,slider=false){
  score+=(slider?j.pts+10:j.pts)+(j.comboBonus?Math.floor(combo*.8):Math.floor(combo*.15));
  combo++;maxCombo=Math.max(maxCombo,combo);hitNotes++;
  if(statCounts[j.key]!==undefined)statCounts[j.key]++;
  updateHUD();showComboPop();
}
function showComboPop(){if(!COMBO_MS.includes(combo))return;const el=document.getElementById('combo-pop');el.textContent=COMBO_LB[combo];el.classList.remove('show');void el.offsetWidth;el.classList.add('show');}
function killMiss(t,ah=false){
  if(!ah){t.dying=true;t.dyingT=0;}t.hit=true;
  if(!ah)totalNotes++;
  statCounts.miss++;
  misses=Math.max(0,misses-1);combo=0;updateHearts();
  showJudgement({name:'MAUVAIS',color:'#E8447A',key:'miss'});
  const f=document.getElementById('miss-flash');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',160);
  if(misses<=0)triggerDeath();
}
function updateHUD(){const el=document.getElementById('score-display');el.textContent=score;el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),110);if(score>bestScore){bestScore=score;document.getElementById('best-display').textContent=bestScore;}}
function updateHearts(){
  const hc=maxMisses===1;
  document.getElementById('h1').style.display=hc?'none':'';
  document.getElementById('h2').style.display=hc?'none':'';
  document.getElementById('hardcore-badge').style.display=hc?'inline':'none';
  for(let i=0;i<3;i++)document.getElementById('h'+i).classList.toggle('lost',i>=misses);
}
function doCountdown(n,cb){if(n<=0){cb();return;}const el=document.getElementById('countdown');el.textContent=n;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>doCountdown(n-1,cb),700);}

// ── START ─────────────────────────────────────────────────────────────────
async function startGame(){
  cancelAnimationFrame(animId);stopAudio();
  if(beatScheduler)clearInterval(beatScheduler);
  if(_songEndChecker)clearInterval(_songEndChecker);
  tiles=[];particles=[];activeSliders={};blockedCols.clear();
  score=0;combo=0;maxCombo=0;totalNotes=0;hitNotes=0;playerDied=false;
  statCounts={parfait:0,excellent:0,super:0,bon:0,miss:0};
  maxMisses=hardcoreMode?1:3;misses=maxMisses;
  patIdx=0;patternQueue=[];timingLinePulse=0;isDying=false;dyingProgress=0;gameRunning=false;
  canvas.style.filter='';pCanvas.style.filter='';
  updateHearts();updateHUD();
  document.getElementById('level-badge').textContent=currentLevel.name+' · '+currentDiff+(hardcoreMode?' ☠':'');
  if(!AC||AC.state==='closed')AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();

  // Load audio
  if(!currentLevel.audioBuffer&&currentLevel.audioUrl){
    showLoading(true,'Chargement audio…');
    try{const res=await fetch(currentLevel.audioUrl);const buf=await res.arrayBuffer();currentLevel.audioBuffer=await getAC().decodeAudioData(buf);}
    catch(e){alert('Impossible de charger '+currentLevel.audioUrl);showLoading(false);return;}
  }

  // Load/build beatmap
  const cacheKey='beatmap_'+currentDiff;
  if(!currentLevel[cacheKey]){
    if(currentLevel.beatmapUrl){
      showLoading(true,'Chargement du niveau…');
      try{const r=await fetch(currentLevel.beatmapUrl);if(r.ok){const base=await r.json();currentLevel[cacheKey]=adaptBeatmap(base,currentDiff);}}
      catch(e){}
    }
    if(!currentLevel[cacheKey]){
      showLoading(true,'Analyse musicale en cours…');
      const result=await analyseAudioInBrowser(currentLevel.audioBuffer);
      currentLevel.bpm=result.bpm;currentLevel.offset=result.offset;
      currentLevel[cacheKey]=adaptBeatmap(result,currentDiff);
    }
  }
  customPattern=currentLevel[cacheKey];
  showLoading(false);
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';

  doCountdown(3,()=>{
    gameRunning=true;
    const ac=getAC(),T0=ac.currentTime+0.06;
    audioStartAcTime=T0;
    customAudioSrc=ac.createBufferSource();customAudioSrc.buffer=currentLevel.audioBuffer;
    customAudioGain=ac.createGain();customAudioGain.gain.value=0.82;
    customAudioSrc.connect(customAudioGain);customAudioGain.connect(ac.destination);
    customAudioSrc.start(T0);
    startScheduler();
    lastTime=performance.now();animId=requestAnimationFrame(t=>{lastTime=t;loop(t);});
  });
}
function showLoading(on,msg=''){
  document.getElementById('start-btn').style.display=on?'none':'block';
  const lt=document.getElementById('loading-text');lt.style.display=on?'block':'none';if(msg)lt.textContent=msg;
}

// ── DEATH ─────────────────────────────────────────────────────────────────
function triggerDeath(){
  if(isDying)return;playerDied=true;gameRunning=false;isDying=true;dyingProgress=0;
  if(beatScheduler)clearInterval(beatScheduler);if(_songEndChecker)clearInterval(_songEndChecker);
  activeSliders={};blockedCols.clear();
  tiles.forEach(t=>{if(t.dying)return;const sign=(t.col<2)?-1:1;t.collapseVx=sign*(18+Math.random()*42);t.collapseVy=0;t.collapseGravity=500+Math.random()*500;t.collapseRot=0;t.collapseRotV=(Math.random()-.5)*7;t.collapseAlpha=1;t.collapsing=true;});
  if(customAudioSrc){try{customAudioSrc.playbackRate.setValueAtTime(1,AC.currentTime);customAudioSrc.playbackRate.linearRampToValueAtTime(0.05,AC.currentTime+1.6);}catch(e){}setTimeout(()=>stopAudio(),2000);}
  if(customAudioGain&&AC&&AC.state!=='closed')try{customAudioGain.gain.setValueAtTime(customAudioGain.gain.value,AC.currentTime);customAudioGain.gain.linearRampToValueAtTime(0,AC.currentTime+1.5);}catch(e){}
  lastTime=performance.now();animId=requestAnimationFrame(t=>{lastTime=t;loop(t);});
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function _showGameOver(){
  canvas.style.filter='';pCanvas.style.filter='';localStorage.setItem('mt_best',bestScore);
  const acc=totalNotes>0?Math.round(hitNotes/totalNotes*100):100;
  let stars=0;
  if(!playerDied&&acc>=95)stars=3;
  else if(!playerDied&&acc>=80)stars=3;
  else if(!playerDied&&acc>=65)stars=2;
  else if(acc>=40)stars=1;
  let grade='',gradeColor='#aaa';
  if(acc>=98){grade='S';gradeColor='#FFD166';}
  else if(acc>=90){grade='A';gradeColor='#06D6A0';}
  else if(acc>=75){grade='B';gradeColor='#4CC9F0';}
  else if(acc>=55){grade='C';gradeColor='#FFBE0B';}
  else{grade='D';gradeColor='#E8447A';}
  document.getElementById('go-title-text').textContent=!playerDied?'TERMINÉ ✓':'GAME OVER';
  document.getElementById('go-title-text').style.color=!playerDied?'#06D6A0':'#FF006E';
  document.getElementById('go-song').textContent=currentLevel.name+' · '+(currentLevel.artist||'')+(hardcoreMode?' · ☠HC':'');
  document.getElementById('go-stars').textContent=['☆☆☆','★☆☆','★★☆','★★★'][stars];
  document.getElementById('go-stars').style.color=stars>0?'#FFD166':'#444';
  document.getElementById('go-grade').textContent=grade;
  document.getElementById('go-grade').style.color=gradeColor;
  document.getElementById('go-grade').style.textShadow='0 0 28px '+gradeColor;
  document.getElementById('go-accuracy').textContent='Précision : '+acc+'%';
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent=bestScore;
  // Detailed stats
  document.getElementById('gs-parfait').textContent=statCounts.parfait;
  document.getElementById('gs-excellent').textContent=statCounts.excellent;
  document.getElementById('gs-super').textContent=statCounts.super;
  document.getElementById('gs-bon').textContent=statCounts.bon;
  document.getElementById('gs-miss').textContent=statCounts.miss;
  document.getElementById('gs-combo').textContent=maxCombo;
  // Animate results in
  const go=document.getElementById('gameover-screen');
  go.style.display='flex';go.style.opacity='0';go.style.transform='translateY(20px)';
  requestAnimationFrame(()=>{go.style.transition='opacity .5s,transform .5s';go.style.opacity='1';go.style.transform='translateY(0)';});
}

async function analyseAudioInBrowser(audioBuffer){
  const sr=audioBuffer.sampleRate;
  const dur=audioBuffer.duration;
  const nCh=Math.min(audioBuffer.numberOfChannels,2);

  // ── Step 1: Render 3 band-filtered versions via OfflineAudioContext ──
  // We run three offline renders: bass (LP@200Hz), mid (BP@200-3000Hz), hi (HP@3000Hz)
  // Each render is at FULL sample rate for accuracy, but we'll downsample after.
  async function renderBand(filterType, freqLo, freqHi){
    const ctx2=new OfflineAudioContext(1, audioBuffer.length, sr);
    const src2=ctx2.createBufferSource();
    // Mix channels to mono
    if(nCh>1){
      const mono=ctx2.createChannelMerger(1);
      // Just use channel 0 for simplicity
    }
    src2.buffer=audioBuffer;
    let node=src2;
    if(filterType==='lowpass'||filterType==='bass'){
      const f=ctx2.createBiquadFilter();f.type='lowpass';f.frequency.value=freqLo;f.Q.value=0.5;
      node.connect(f);node=f;
    } else if(filterType==='highpass'||filterType==='hi'){
      const f=ctx2.createBiquadFilter();f.type='highpass';f.frequency.value=freqHi;f.Q.value=0.5;
      node.connect(f);node=f;
    } else {
      // bandpass = lowpass - highpass
      const lp=ctx2.createBiquadFilter();lp.type='lowpass';lp.frequency.value=freqHi;lp.Q.value=0.5;
      const hp=ctx2.createBiquadFilter();hp.type='highpass';hp.frequency.value=freqLo;hp.Q.value=0.5;
      node.connect(lp);lp.connect(hp);node=hp;
    }
    node.connect(ctx2.destination);
    src2.start(0);
    const rendered=await ctx2.startRendering();
    return rendered.getChannelData(0);
  }

  // Show progress steps
  const modal=document.getElementById('add-modal');
  const modalOpen=modal&&modal.style.display!=='none';
  const progEl=modalOpen?document.getElementById('modal-progress'):null;
  const statEl=modalOpen?document.getElementById('modal-status'):null;
  const ltEl=document.getElementById('loading-text');
  function setP(p,msg){
    if(progEl) progEl.style.width=p+'%';
    if(statEl) statEl.textContent=msg;
    if(!modalOpen&&ltEl){ ltEl.textContent=msg; ltEl.style.display='block'; }
  }

  setP(10,'Analyse bandes de fréquences (basses)…');
  const rawBass=await renderBand('bass',200,0);
  setP(30,'Analyse bandes de fréquences (médiums)…');
  const rawMid=await renderBand('mid',200,3000);
  setP(50,'Analyse bandes de fréquences (aiguës)…');
  const rawHi=await renderBand('hi',0,3000);
  setP(65,'Calcul des onsets…');
  await new Promise(r=>setTimeout(r,0));

  // ── Step 2: Compute onset envelopes at reduced rate ──
  // Downsample to ~200Hz (frame rate for onset detection)
  const DS=Math.round(sr/200); // ~220 at 44100Hz
  const nFrames=Math.floor(rawBass.length/DS);
  const bass=new Float32Array(nFrames);
  const mid=new Float32Array(nFrames);
  const hi=new Float32Array(nFrames);
  const full=new Float32Array(nFrames);

  // RMS per frame then positive flux
  function frameRMS(raw,start,len){
    let sum=0;for(let i=0;i<len&&start+i<raw.length;i++) sum+=raw[start+i]*raw[start+i];
    return Math.sqrt(sum/len);
  }
  let pb=0,pm=0,ph=0,pf=0;
  for(let f=0;f<nFrames;f++){
    const s=f*DS;
    const rb=frameRMS(rawBass,s,DS);
    const rm=frameRMS(rawMid,s,DS);
    const rh=frameRMS(rawHi,s,DS);
    const rf=(rb+rm+rh)/3;
    bass[f]=Math.max(0,rb-pb)*2; // flux (derivative)
    mid[f] =Math.max(0,rm-pm)*2;
    hi[f]  =Math.max(0,rh-ph)*2;
    full[f]=Math.max(0,rf-pf)*2;
    pb=rb;pm=rm;ph=rh;pf=rf;
  }
  const dsr=sr/DS; // ~200Hz effective

  setP(75,'Détection du BPM…');
  await new Promise(r=>setTimeout(r,0));

  // ── Step 3: BPM via autocorrelation on full onset ──
  const lagMin=Math.floor(60/200*dsr); // 200bpm
  const lagMax=Math.floor(60/55 *dsr); // 55bpm
  let bpm=120;
  {
    const mean=full.reduce((a,b)=>a+b,0)/full.length;
    const norm=new Float32Array(full.length);
    for(let i=0;i<full.length;i++) norm[i]=full[i]-mean;
    let best=-1e18,bestLag=0;
    for(let lag=lagMin;lag<=Math.min(lagMax,norm.length-1);lag++){
      let ac=0;
      for(let i=0;i<norm.length-lag;i+=3) ac+=norm[i]*norm[i+lag];
      if(ac>best){best=ac;bestLag=lag;}
    }
    if(bestLag>0){
      let c=Math.round(60/(bestLag/dsr));
      while(c<65) c*=2; while(c>200) c=Math.round(c/2);
      bpm=c;
    }
  }

  // ── Step 4: Beat grid offset ──
  setP(85,'Alignement sur le beat…');
  await new Promise(r=>setTimeout(r,0));
  const bi=60/bpm;
  let bestSc=-1,offset=0;
  for(let phase=0;phase<bi;phase+=bi/64){
    let s=0;
    for(let b=0;b*bi+phase<dur;b++){
      const t=b*bi+phase;
      const f=Math.round(t*dsr);
      const fw=Math.round(0.025*dsr);
      for(let i=Math.max(0,f-fw);i<=Math.min(nFrames-1,f+fw);i++) s+=full[i];
    }
    if(s>bestSc){bestSc=s;offset=phase;}
  }

  setP(95,'Construction du pattern…');
  await new Promise(r=>setTimeout(r,0));
  const pattern=buildPatternFromOnsets(bpm,offset,dur,bass,mid,hi,1,dsr);
  setP(100,'Analyse terminée !');
  return {bpm,offset,pattern};
}

// (adaptBeatmap now combined into buildPatternFromOnsets section above)

// ── BUILD PATTERN FROM ONSET DATA ─────────────────────────────────────────────
// Approach: classify each beat position by musical content, then create
// a raw "event list" that adaptBeatmap turns into actual game tiles.
// Events carry: time (absolute seconds), beat index, strength classification,
//   isKick (bass drum onset), isSnare (mid transient), isMelody (sustained mid),
//   isHihat (hi transient), canSlider (sustained note, good for hold).
function buildPatternFromOnsets(bpm,offset,dur,bass,mid,hi,HOP,sr){
  const bi=60/bpm;
  const nBeats=Math.floor((dur-offset)/bi);

  // ── Lookup: onset strength at a time window ──
  function bandAt(arr,timeSec,winSec){
    const f=Math.round(timeSec*(sr/HOP));
    const fw=Math.max(1,Math.round(winSec*(sr/HOP)));
    let sum=0;
    for(let i=Math.max(0,f-fw);i<=Math.min(arr.length-1,f+fw);i++) sum+=arr[i];
    return sum;
  }

  // ── Per-beat measurements ──
  // Narrow window (10ms) for transient detection, wide (40ms) for sustain
  const WIN_TR=0.010, WIN_SU=0.040;
  const B=new Float32Array(nBeats),M=new Float32Array(nBeats),H=new Float32Array(nBeats);
  for(let b=0;b<nBeats;b++){
    const t=offset+b*bi;
    B[b]=bandAt(bass,t,WIN_TR); M[b]=bandAt(mid,t,WIN_TR); H[b]=bandAt(hi,t,WIN_TR);
  }

  // ── Adaptive thresholds ──
  // Use 60th-percentile as "present" threshold → more musical discrimination
  function percentile(arr,p){
    const s=[...arr].sort((a,b2)=>a-b2);
    return s[Math.floor(s.length*p)]||0.0001;
  }
  const bThresh=percentile(B,0.35);  // bass: present if above 35th pct
  const mThresh=percentile(M,0.40);  // mid melody
  const hThresh=percentile(H,0.45);  // hihat / bright transient

  // ── Sustain detection: compare narrow vs wide window ──
  // Sustained note: wide-window energy >> narrow-window peak → legato, good for slider
  function sustainAt(arr,timeSec){
    const wide=bandAt(arr,timeSec,WIN_SU);
    const narrow=bandAt(arr,timeSec,WIN_TR);
    return wide>0 ? narrow/wide : 0; // low ratio = more sustained
  }

  // ── Build events at every beat AND half-beat ──
  const rawEvents=[];
  for(let b=0;b<nBeats;b++){
    const t=offset+b*bi;
    for(const sub of [0, 0.5]){
      const ts=t+sub*bi;
      if(ts>=dur) continue;
      const bS=bandAt(bass,ts,WIN_TR);
      const mS=bandAt(mid,ts,WIN_TR);
      const hS=bandAt(hi,ts,WIN_TR);
      const isKick  = bS>bThresh;
      const isMelody= mS>mThresh && mS>hS*1.2; // mid stronger than bright
      const isHihat = hS>hThresh && hS>mS;
      const isSnare = mS>mThresh*1.6 && bS>bThresh*0.5; // mid+bass combo
      const hasAny  = isKick||isMelody||isHihat||isSnare;
      const isStrong= isKick && bS>bThresh*2.0;
      // Slider: mid melody note with low ratio (sustained) AND no bright hi-hat
      const sus=sustainAt(mid,ts);
      const canSlider=isMelody && !isHihat && sus<0.65 && mS>mThresh*1.1;

      rawEvents.push({
        beat:b+sub, time:parseFloat(ts.toFixed(4)),
        rest:!hasAny,
        isStrong, isKick, isMelody, isHihat, isSnare, canSlider,
        bassStr:bS, midStr:mS, hiStr:hS,
      });
    }
  }
  // Sort by time (half-beats already interleaved)
  rawEvents.sort((a,b)=>a.time-b.time);
  return rawEvents;
}

// ── ADAPT BEATMAP TO DIFFICULTY ─────────────────────────────────────────────
// KEY RULE: difficulty NEVER changes the timing of events.
// It only controls:
//   EASY: only beat 0 of each bar (quarter notes), tap only
//   NORMAL: all quarter notes (beat), sliders on sustained melody notes
//   HARD: quarter + 8th notes, sliders + occasional diagonal
//   INSANE: quarter + 8th + 16th (via double notes), full type palette
//   HARDCORE: same as INSANE but 1 life
// Column assignment is musical: kick → jump, melody step → adjacent
function adaptBeatmap(base, diff){
  const P=DIFF_PARAMS[diff];
  const events=Array.isArray(base.pattern)?base.pattern:base; // handle both formats
  const out=[];
  let lastCol=-1, prevType='tap';
  let diagGap=0;
  const diagMinGap={EASY:999,NORMAL:999,HARD:16,INSANE:10,HARDCORE:12};
  const minDiagGap=diagMinGap[diff]||999;

  // Column motion helpers
  function kickCol(last){
    // Kick → big jump (skip at least 1 col)
    if(last<0) return Math.floor(Math.random()*4);
    const opts=[0,1,2,3].filter(c=>Math.abs(c-last)>=2);
    return opts.length?opts[Math.floor(Math.random()*opts.length)]:3-last;
  }
  function stepCol(last){
    // Melody step → adjacent column
    if(last<0) return Math.floor(Math.random()*4);
    return Math.max(0,Math.min(3,last+(Math.random()<.5?-1:1)));
  }
  function anyCol(last){
    if(last<0) return Math.floor(Math.random()*4);
    let c;do{c=Math.floor(Math.random()*4);}while(c===last);return c;
  }
  function pickCol2(a,b2){
    let c,n=0;do{c=Math.floor(Math.random()*4);n++;}while(n<10&&(c===a||c===b2));return c;
  }

  for(const e of events){
    // Skip half-beats in EASY
    const isHalfBeat=e.beat%1!==0;
    if(diff==='EASY'&&isHalfBeat) continue;
    // Skip half-beats in NORMAL unless strong melody note
    if(diff==='NORMAL'&&isHalfBeat&&!e.isMelody) continue;

    if(e.rest){out.push({time:e.time,rest:true});diagGap++;continue;}

    // Column: kick → jump, melody → step, other → any
    let col;
    if(e.isKick) col=kickCol(lastCol);
    else if(e.isMelody) col=stepCol(lastCol);
    else col=anyCol(lastCol);

    diagGap++;
    let type='tap';
    if(prevType!=='slider'&&prevType!=='diagonal'){
      const canDiag=(diff==='HARD'||diff==='INSANE'||diff==='HARDCORE')&&diagGap>=minDiagGap;
      const rnd=Math.random();
      if(canDiag&&rnd<P.diagChance&&e.isStrong){
        type='diagonal'; diagGap=0;
      } else if(e.canSlider&&rnd<P.sliderChance){
        type='slider';
      } else if(e.canSlider&&!isHalfBeat&&rnd<P.sliderChance*1.5){
        type='slider'; // give sliders a boost on main beats
      }
    }

    // Double notes: two simultaneous taps (NORMAL+)
    let dbl=false,col2=-1;
    if(type==='tap'&&e.isStrong&&Math.random()<P.doubleChance){
      dbl=true; col2=pickCol2(col,lastCol);
    }

    let diagTarget=col;
    if(type==='diagonal'){
      const opts=[0,1,2,3].filter(c=>c!==col&&Math.abs(c-col)>=1);
      diagTarget=opts.length?opts[Math.floor(Math.random()*opts.length)]:3-col;
    }

    out.push({time:e.time,rest:false,type,col,col2:type==='diagonal'?diagTarget:col2,double:dbl,beat:e.beat});
    lastCol=col; prevType=type;
  }
  return out;
}

// ── UI ────────────────────────────────────────────────────────────────────
function buildUI(){
  ALL_LEVELS=[...BUILTIN_LEVELS,...CUSTOM_LEVELS];
  buildAllCarousel();
}

function buildAllCarousel(){
  const c=document.getElementById('all-carousel');c.innerHTML='';
  const addEl=document.createElement('div');
  addEl.className='level-card add-card';
  addEl.innerHTML=`<div class="add-icon">+</div><div class="add-card-lbl">Importer</div><input type="file" id="loc-audio" accept="audio/*,audio/mpeg,audio/mp3,audio/aac,audio/m4a,audio/x-m4a,.mp3,.m4a,.aac,.wav,.ogg,.flac">`;
  c.appendChild(addEl);
  document.getElementById('loc-audio').addEventListener('change',onAudioSelect);

  ALL_LEVELS.forEach((lv,idx)=>{
    const el=document.createElement('div');
    el.className='level-card'+(lv.id===currentLevel.id?' active':'');
    el.style.setProperty('--accent',lv.accent||'#06D6A0');
    const img=lv.cover?`<img src="${lv.cover}" class="lc-cover" alt="" onerror="this.outerHTML='<div class=\'lc-cover\'>🎵</div>'">`:`<div class="lc-cover">🎵</div>`;
    const bpmLabel=lv.bpm?` · ${lv.bpm} BPM`:'';
    let delBtn=lv.custom?`<button class="del-btn">✕</button>`:'';
    el.innerHTML=`${img}<div class="lc-info"><div class="lc-name">${lv.name}</div><div class="lc-sub">${lv.artist||''}${bpmLabel}</div></div>${delBtn}`;
    if(lv.custom){el.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();const ci=CUSTOM_LEVELS.indexOf(lv);if(ci>=0)CUSTOM_LEVELS.splice(ci,1);if(currentLevel.id===lv.id)currentLevel=BUILTIN_LEVELS[0];buildUI();});}
    el.addEventListener('click',()=>{currentLevel=lv;buildUI();});
    c.appendChild(el);
  });
  initMagnetCarousel(c, ALL_LEVELS.findIndex(lv=>lv.id===currentLevel.id)+1);
}

function initMagnetCarousel(track, initIdx=0){
  const cards=Array.from(track.children);
  const GAP=14,CW=160,STEP=CW+GAP;
  const wrapW=track.parentElement.offsetWidth||window.innerWidth;
  const CENTER=(wrapW-CW)/2;
  let curIdx=Math.max(0,Math.min(cards.length-1,initIdx));
  let dragStart=0,dragBase=0,dragging=false,curTx=0;
  function txFor(i){return CENTER-i*STEP;}
  function snapTo(i){
    i=Math.max(0,Math.min(cards.length-1,i));curIdx=i;curTx=txFor(i);
    track.classList.add('animating');track.style.transform=`translateX(${curTx}px)`;
    setTimeout(()=>track.classList.remove('animating'),360);
    cards.forEach((c,j)=>c.classList.toggle('active',j===curIdx));
    const lv=curIdx>0?ALL_LEVELS[curIdx-1]:null;if(lv)currentLevel=lv;
  }
  track.style.transform=`translateX(${txFor(curIdx)}px)`;
  cards[curIdx]?.classList.add('active');
  function onStart(x){dragging=true;dragStart=x;dragBase=curTx;}
  function onMove(x){if(!dragging)return;curTx=dragBase+(x-dragStart);track.style.transform=`translateX(${curTx}px)`;}
  function onEnd(x){if(!dragging)return;dragging=false;const d=x-dragStart;snapTo(d<-STEP*.28?curIdx+1:d>STEP*.28?curIdx-1:curIdx);}
  track.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX);});
  window.addEventListener('mouseup',e=>{if(dragging)onEnd(e.clientX);});
  track.addEventListener('touchstart',e=>{e.stopPropagation();onStart(e.touches[0].clientX);},{passive:true});
  track.addEventListener('touchmove', e=>{e.stopPropagation();onMove(e.touches[0].clientX);},{passive:true});
  track.addEventListener('touchend',  e=>{e.stopPropagation();onEnd(e.changedTouches[0].clientX);},{passive:true});
}

// ── AUDIO IMPORT ─────────────────────────────────────────────────────────
async function onAudioSelect(e){
  if(!e.target.files.length)return;
  const file=e.target.files[0];e.target.value='';
  const nameRaw=file.name.replace(/\.[^/.]+$/,'');
  document.getElementById('loc-title').value=nameRaw;
  document.getElementById('loc-artist').value='';
  document.getElementById('modal-save').disabled=true;
  document.getElementById('modal-status').textContent='Décodage audio…';
  document.getElementById('modal-status').className='modal-status';
  setMProgress(5);
  document.getElementById('add-modal').style.display='flex';
  try{
    const ab=await file.arrayBuffer();
    tempAudioBuffer=await getAC().decodeAudioData(ab);
    setMProgress(18);
    document.getElementById('modal-status').textContent='Analyse BPM & rythme…';
    const res=await analyseAudioInBrowser(tempAudioBuffer);
    tempAudioBuffer._bpm=res.bpm;tempAudioBuffer._offset=res.offset;tempAudioBuffer._pattern=res.pattern;
    setMProgress(90);
    // Try to fetch cover art from musichoarders API
    document.getElementById('modal-status').textContent='Recherche de la pochette…';
    const titleVal=document.getElementById('loc-title').value;
    let coverDataUrl=null;
    try{
      const q=encodeURIComponent(titleVal);
      const resp=await fetch(`https://covers.musichoarders.xyz/api/search?q=${q}&limit=1`);
      if(resp.ok){const data=await resp.json();if(data.results&&data.results[0]&&data.results[0].cover){
        // Fetch image and convert to data URL
        const imgResp=await fetch(data.results[0].cover);
        if(imgResp.ok){const blob=await imgResp.blob();coverDataUrl=await new Promise(r=>{const reader=new FileReader();reader.onload=()=>r(reader.result);reader.readAsDataURL(blob);});}
      }}
    }catch(ce){/* cover fetch failed, continue without */}
    setMProgress(100);
    document.getElementById('modal-status').textContent=`✓ BPM: ${res.bpm} · ${res.pattern.filter(x=>!x.rest).length} notes`;
    document.getElementById('modal-status').className='modal-status ok';
    tempAudioBuffer._cover=coverDataUrl;
    document.getElementById('modal-save').disabled=false;
  }catch(err){
    document.getElementById('modal-status').textContent='Erreur : fichier audio invalide.';
    document.getElementById('modal-status').className='modal-status err';setMProgress(0);
  }
}
function setMProgress(p){document.getElementById('modal-progress').style.width=p+'%';}
document.getElementById('modal-cancel').addEventListener('click',()=>{document.getElementById('add-modal').style.display='none';tempAudioBuffer=null;setMProgress(0);});
document.getElementById('modal-save').addEventListener('click',()=>{
  if(!tempAudioBuffer)return;
  const title=document.getElementById('loc-title').value||'Inconnu';
  const artist=document.getElementById('loc-artist').value||'Importé';
  const bpm=tempAudioBuffer._bpm||120;
  const dc='#06D6A0';
  const newLevel={id:'loc_'+Date.now(),name:title,artist,bpm,offset:tempAudioBuffer._offset||0,diffColor:dc,accent:dc,custom:true,audioBuffer:tempAudioBuffer,_basePattern:tempAudioBuffer._pattern,cover:tempAudioBuffer._cover||null};
  CUSTOM_LEVELS.push(newLevel);currentLevel=newLevel;
  document.getElementById('add-modal').style.display='none';tempAudioBuffer=null;setMProgress(0);
  buildUI();
});
